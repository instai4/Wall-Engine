<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polar Tile </title>
    <style>
        html {
            height: 100%;
        }
        body {
            background: #333;
            overflow: hidden;
            padding: 0;
            margin: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
        }
        canvas {
            height: 100%;
            width: 100%;
            display: block;
        }
    </style>
    <!-- Include TWGL library -->
    <script src="https://twgljs.org/dist/4.x/twgl.min.js"></script>
</head>
<body>
    <canvas id="canvas"></canvas>

    <!-- Vertex Shader -->
    <script id="vertexShader" type="x-shader/x-vertex">#version 300 es
        precision highp float;
        in vec4 position;
        void main() {
            gl_Position = vec4(position);
        }
    </script>

    <!-- Fragment Shader -->
    <script id="fragmentShader" type="x-shader/x-fragment">#version 300 es
        precision highp float;
        out vec4 fragColor;
        uniform vec2 u_resolution;
        uniform float u_time;
        uniform vec4 u_mouse;
        uniform sampler2D iChannel0;
        uniform sampler2D iChannel1;

        #define R          u_resolution
        #define T          u_time
        #define M          u_mouse
        #define PI         3.141592653
        #define PI2        6.283185307

        // number of tile rows in warp
        #define N     6.

        mat2 rot(float a) { return mat2(cos(a), sin(a), -sin(a), cos(a)); }

        float hash21(vec2 a) { 
            a.y = mod(a.y, N);
            return fract(sin(dot(a, vec2(27.609, 57.583))) * 43758.5453); 
        }

        float box(in vec2 p, in vec2 b) {
            vec2 q = abs(p) - b;
            return min(max(q.x, q.y), 0.0) + length(max(q, 0.0));
        }

        // size is height of tile - adjustable
        const float size = 2.0;
        const float hlf = size / 2.0;
        const float dbl = size * 2.0;

        // @iq hsv2rgb
        vec3 hsv(in vec3 c) {
            vec3 rgb = clamp(abs(mod(c.x * 6.0 + vec3(0, 4, 2), 6.0) - 3.0) - 1.0, 0.0, 1.0);
            return c.z * mix(vec3(1.0), rgb, c.y);
        }

        void main() {
            vec2 F = gl_FragCoord.xy;
            vec2 uv = (2.0 * F.xy - R.xy) / max(R.x, R.y);

            uv *= rot(-T * 0.08);
            uv = -vec2(log(length(uv)), atan(uv.y, uv.x));
            uv /= PI;
            uv *= N;

            float px = fwidth(uv.x) * 2.5;
            uv.x += T * 0.4;

            vec2 p = uv * size, q;
            vec3 C = vec3(0.0);

            float sp = 0.45, sl = hlf * 0.975;
            float t = 1e5, id, fd;

            for (int i = 0; i < 2; i++) {
                if (i == 1) p.y += 0.5;
                float cnt = i < 1 ? size : dbl;
                q = vec2(p.x - cnt, p.y);
                id = floor(q.x / dbl) + 0.5;
                q.x -= id * dbl;

                fd = floor(q.y) + float(i);
                q.y = fract(q.y) - 0.5;
                t = box(q, vec2(sl, sp));
                float tc = length(q - vec2(sl, 0.0)) - sp;
                float bc = length(vec2(q.x, abs(q.y) - sp) + vec2(sl, 0.0)) - 0.5;

                t = min(t, tc);
                t = max(t, -bc);

                float hs = hash21(vec2(id, fd));
                float fs = fract(hs * 4785.312);

                vec3 h = hsv(vec3(hs * 0.5 + T * 0.01, 1.0, 0.6));
                vec3 CC = mix(h, h * 0.3, 0.75 - q.x * 0.5);
                C = mix(C, CC, smoothstep(px, -px, t));

                tc = length(q - vec2(sl * sin(hs + T * hs), 0.0)) - (sp * 0.8);
                tc = max(tc, t);

                C = mix(C, hsv(vec3(fs * 0.5 + T * 0.01, 1.0, 0.2)), smoothstep(px, -px, tc));
                C = mix(C, vec3(0.0), smoothstep(px, -px, abs(tc + 0.03) - 0.03));
            }

            C = pow(C, vec3(0.4545));
            fragColor = vec4(C, 1.0);
        }
    </script>

    <!-- Rendering Script -->
    <script>
        (function() {
            const canvas = document.getElementById("canvas");
            const gl = canvas.getContext("webgl2");
            if (!gl) {
                alert("WebGL2 not supported!");
                return;
            }

            // Create program from the script tags
            const programInfo = twgl.createProgramInfo(gl, ["vertexShader", "fragmentShader"]);

            const arrays = {
                position: [-1, -1, 0, 1, -1, 0, -1, 1, 0, -1, 1, 0, 1, -1, 0, 1, 1, 0]
            };
            const bufferInfo = twgl.createBufferInfoFromArrays(gl, arrays);

            function render(time) {
                twgl.resizeCanvasToDisplaySize(gl.canvas, 1.0);
                gl.viewport(0, 0, gl.canvas.width, gl.canvas.height);

                const uniforms = {
                    u_time: time * 0.001,
                    u_resolution: [gl.canvas.width, gl.canvas.height],
                    u_mouse: [0, 0, 0, 0] // dummy, not used
                };

                gl.useProgram(programInfo.program);
                twgl.setBuffersAndAttributes(gl, programInfo, bufferInfo);
                twgl.setUniforms(programInfo, uniforms);
                twgl.drawBufferInfo(gl, bufferInfo);

                requestAnimationFrame(render);
            }

            requestAnimationFrame(render);
        })();
    </script>
</body>
</html>
